              <p>#1.说明<br>
在电子类项目的开发过程中，经常需要对一些模块进行调试，电脑软件种类太多，于是萌生了一个创建检测工具的想法。</p>
<p>#2.目的<br>
创建一个可以检测多种总线的工具，显示总线的数据，并且可以和电脑通讯，自带屏幕，可调节总线参数，可加载通讯协议。</p>
<p>#3.功能说明<br>
##3.1 SPI总线<br>
##3.2 I2C总线<br>
##3.3 RS232总线<br>
##3.4 RS485总线<br>
##3.5 CAN总线<br>
##3.6 LIN总线</p>
